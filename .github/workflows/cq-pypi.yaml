name: Publishing CQ to PyPI
run-name: "Deploying ChromaQuant version ${{ github.ref_name }} by ${{ github.actor }}"
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: "Build version distribution"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: "Install dependencies"
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade hatch
    - name: "Clean build with Hatch"
      run: |
        python -m hatch build --clean
    - name: "Save build output"
      uses: actions/upload-artifact@v4
      with:
        name: cq-dist
        path: dist/
  publish:
    name: "Publish to PyPI"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/chromaquant/
    permissions:
      id-token: write
    steps:
    - name: "Download distributions"
      uses: actions/download-artifact@v6
      with:
        name: cq-dist
        path: dist/
    - name: "Publish distributions"
      uses: pypa/gh-action-pypi-publish@release/v1
